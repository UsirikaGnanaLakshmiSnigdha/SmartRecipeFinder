    <!-- Navbar -->

    <nav class="navbar">

        <div class="logo">
            🍳 Smart Recipe Finder
        </div>

        <ul class="nav-links">

            <li>
                <a href="index.html">

                </a>
            </li>

            <li>
                <a href="recipe.html">

            <li>

            <li>

            <li>

            <li>

        </ul>

    <!-- Header -->

    <section class="hero-small">

        <h1>
            Explore Recipes
        </h1>

        <p>
            Browse all available recipes
        </p>

    </section>

    <!-- Category Filters -->

    <div class="filter-container">

        <button onclick="filterCategory('All')">
            All
        </button>

        <button onclick="filterCategory('Breakfast')">
            Breakfast
        </button>

        <button onclick="filterCategory('Lunch')">
            Lunch
        </button>

        <button onclick="filterCategory('Dinner')">
            Dinner
        </button>

        <button onclick="filterCategory('Snacks')">
            Snacks
        </button>

        <button onclick="filterCategory('Drinks')">
            Drinks
        </button>

    </div>

    <!-- Food Type Filters -->

    <div class="filter-container">

        <button onclick="filterFoodType('All')">
            All
        </button>

        <button onclick="filterFoodType('Veg')">
            Veg
        </button>

        <button onclick="filterFoodType('Non-Veg')">
            Non-Veg
        </button>

    </div>

    <!-- Recipes -->

    <div id="results" class="recipe-grid">

    </div>

    <script src="js/recipe.js"></script>
    <script src="js/favorites.js"></script>
